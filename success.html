<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super gemacht! 🎉</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-body: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
      --color-bg: #f0fff4;
      --color-surface: #ffffff;
      --color-primary: #66bb6a;
      --color-primary-dark: #388e3c;
      --color-text: #1a2a1a;
      --color-text-muted: #4a7a4a;
      --radius-xl: 1.5rem;
      --radius-full: 9999px;
      --shadow-card: 0 8px 32px rgba(0,150,50,0.12);
    }

    html, body {
      min-height: 100dvh;
      font-family: var(--font-body);
      background: linear-gradient(160deg, #e8f5e9 0%, #f0fff4 50%, #e0f7fa 100%);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .trophy {
      font-size: 5rem;
      line-height: 1;
      animation: bounce 1.2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .stars {
      display: flex;
      gap: 0.5rem;
      font-size: 1.8rem;
      animation: starPop 0.6s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes starPop {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 900;
      color: var(--color-primary-dark);
      line-height: 1.15;
    }

    p {
      font-size: 1rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      max-width: 28ch;
    }

    .checkmarks {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      background: #f1f8e9;
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      text-align: left;
    }
    .checkmark-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-primary-dark);
    }

    .btn-again {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, #66bb6a, #388e3c);
      color: #fff;
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius-full);
      padding: 1rem 2.2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(56,142,60,0.35);
      transition: transform 200ms cubic-bezier(0.16,1,0.3,1), box-shadow 200ms;
      width: 100%;
      justify-content: center;
      text-decoration: none;
    }
    .btn-again:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(56,142,60,0.45); }
    .btn-again:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="card">
    <div class="trophy">🏆</div>
    <div class="stars">⭐ ⭐ ⭐</div>
    <h1>Super gemacht!</h1>
    <p>Deine Zähne sind jetzt sauber und gesund!</p>

    <div class="checkmarks">
      <div class="checkmark-item"><span>✅</span> Zähne geputzt</div>
      <div class="checkmark-item"><span>✅</span> 2 Minuten geschafft</div>
      <div class="checkmark-item"><span>✅</span> Held:in des Tages</div>
    </div>

    <a class="btn-again" href="brushing.html">
      <span>🪥</span> Nochmal putzen
    </a>
  </div>

  <script>
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const COLORS = ['#4fc3f7','#66bb6a','#ffca28','#ef5350','#ab47bc','#26c6da'];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function Particle() {
      this.x = Math.random() * canvas.width;
      this.y = -10;
      this.size = 6 + Math.random() * 8;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.vy = 2 + Math.random() * 3;
      this.vx = (Math.random() - 0.5) * 2;
      this.angle = Math.random() * Math.PI * 2;
      this.spin = (Math.random() - 0.5) * 0.15;
      this.opacity = 1;
    }

    function spawnBurst(count) { for (let i = 0; i < count; i++) particles.push(new Particle()); }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.y < canvas.height + 20 && p.opacity > 0.05);
      particles.forEach(p => {
        p.y += p.vy; p.x += p.vx; p.angle += p.spin; p.opacity -= 0.005;
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
        ctx.restore();
      });
      requestAnimationFrame(tick);
    }

    spawnBurst(120);
    setTimeout(() => spawnBurst(80), 600);
    setTimeout(() => spawnBurst(60), 1200);
    tick();
  </script>
</body>
</html>
